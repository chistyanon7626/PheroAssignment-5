<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <!-- Tailwind + DaisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
    <title>Login</title>
    <link rel="icon" type="image/x-icon" href="./assets/github-logo.png">
</head>
<body class="flex items-center justify-center h-screen bg-[#F8FAFC] ">
   
  <div class="card w-3/12 bg-white shadow-xl p-6">

    <img class=" mx-auto" src="./assets/github-logo.png" alt="github logo" />
    <h2 class="text-2xl font-bold text-center mb-2 text-[#1F2937]">GitHub Issues Tracker</h2>
    <p class="text-center text-gray-500 mb-4">Sign in to manage your issues</p>

    <p class=" text-[#1F2937] mb-2 ">Username</p>
    <input id="username" type="text" placeholder="Enter Username" class="input input-bordered w-full mb-3 bg-white" />
    <p class="text-[#4A00FF]">Default: admin</p>

    <p class="text-[#1F2937] mb-2">Password</p>
    <input id="password" type="password" placeholder="Enter Password" class="input input-bordered w-full mb-3 bg-white" />
    <p class="text-[#4A00FF]">Default: admin123</p>

    <button onclick="login()" class="btn btn-primary bg-[#4A00FF] w-full text-white mt-6 mb-6">Sign In</button>

    <div class="flex items-center justify-center my-3">
      <hr class="w-full border-gray-300">
      <span class="mx-2 text-[#1F2937]">OR</span>
      <hr class="w-full border-gray-300">
    </div>

    <div class="text-center">
      <p class="text-sm text-[#64748B]">Demo Credentials:</p>
      <p class=" text-semibold mt-3 text-[#1F2937] ">
        <b>Username: </b>admin
      </p>
      <p class="text-semibold text-[#1F2937]">
        <b>Password: </b>admin123
      </p>
      <p id="error" class="text-red-500 text-center mt-2"></p>
    </div>

  </div>
  <script > 
  function login() {
      const user = document.getElementById("username").value.trim();
      const pass = document.getElementById("password").value.trim();
      const error = document.getElementById("error");

      // Check empty fields
      if (!user || !pass) {
        error.innerText = "Please fill in all fields!";
        return;
      }

      // Validate credentials
      if (user === "admin" && pass === "admin123") {
        localStorage.setItem("isLoggedIn", "true");
        window.location.href = "index.html";
      } else {
        error.innerText = "Invalid credentials!";
      }
    }

   // Optional: press Enter to login
    document.addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        login();
      }
    });
    </script>
    
</body>
</html>
